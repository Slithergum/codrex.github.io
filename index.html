<!doctype html>
<html>
  <head>
    <title></title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <div align=center class="mainDiv">
    <div align=center>
      <h3>Calculator ni Mang Kanor</h3>
      <input id="input" type="text" value="" />
    </div>
    <div align=center>
      
    <table>
      <tr>
        <td><button id="btn1">1</button></td>
        <td><button id="btn2">2</button></td>
        <td><button id="btn3">3</button></td>
      </tr>
      <tr>
        <td><button id="btn4">4</button></td>
        <td><button id="btn5">5</button></td>
        <td><button id="btn6">6</button></td>
      </tr>
      <tr>
        <td><button id="btn7">7</button></td>
        <td><button id="btn8">8</button></td>
        <td><button id="btn9">9</button></td>
      </tr>
      <tr>
        <td><button id="clear">C</button></td>
        <td><button id="btn0">0</button></td>
        <td><button id="eq">=</button></td>
      </tr>
      <tr class="operator">
        <td colspan=""><button class="mult" id="mult">x</button></td>
        <td colspan=""><button class="sub" id="sub">-</button></td>
        <td colspan=""><button class="add" id="add">+</button></td>
      </tr>
    </table>
      </div>
      </div>
    <script src="script.js"></script>
  </body>
</html>
