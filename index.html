<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Responsive Birthday Card</title>
  <style>
    body {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      background-color: #f8d7da; /* pink background */
      font-family: cursive;
    }
    .cover {
      display: flex;
      width: 90%;
      max-width: 500px;
      overflow: hidden;
      position: relative;
      height: 200px;
    }
    .cover p {
      flex: 1;
      margin: 0;
      text-align: center;
      line-height: 200px;
      font-size: 2em;
      background-color: #fff;
    }
    #left {
      transform-origin: left;
    }
    #right {
      transform-origin: right;
    }
    @keyframes slideOutLeft {
      to { transform: translateX(-100%); }
    }
    @keyframes slideOutRight {
      to { transform: translateX(100%); }
    }
    @keyframes slideInLeft {
      from { transform: translateX(-100%); }
      to { transform: translateX(0); }
    }
    @keyframes slideInRight {
      from { transform: translateX(100%); }
      to { transform: translateX(0); }
    }
    #content {
      display: none;
      padding: 20px;
      background-color: #fff;
      text-align: center;
      width: 100%;
    }
    button {
      margin-top: 20px;
      padding: 10px 20px;
      font-size: 1em;
      cursor: pointer;
    }
    /* Responsive adjustments */
    @media (max-width: 600px) {
      .cover {
        height: 150px;
      }
      .cover p {
        font-size: 1.5em;
        line-height: 150px;
      }
      button {
        font-size: 0.9em;
        padding: 8px 16px;
      }
    }
    @media (max-width: 400px) {
      .cover {
        height: 120px;
      }
      .cover p {
        font-size: 1.2em;
        line-height: 120px;
      }
    }
  </style>
</head>
<body>
  <div class="cover">
    <p id="left">🎂 Happy</p>
    <p id="right">Birthday 🎉</p>
  </div>
  <div id="content">
    <h2>Surprise!</h2>
    <p>Wishing you all the best on your special day!</p>
  </div>
  <button id="btn">OPEN</button>

  <script>
    const btn = document.getElementById('btn');
    const left = document.getElementById('left');
    const right = document.getElementById('right');
    const content = document.getElementById('content');
    let isOpen = false;

    btn.addEventListener('click', () => {
      if (!isOpen) {
        left.style.animation = 'slideOutLeft 1s forwards';
        right.style.animation = 'slideOutRight 1s forwards';
        setTimeout(() => { content.style.display = 'block'; }, 1000);
        btn.textContent = 'CLOSE';
      } else {
        left.style.animation = 'slideInLeft 1s forwards';
        right.style.animation = 'slideInRight 1s forwards';
        content.style.display = 'none';
        btn.textContent = 'OPEN';
      }
      isOpen = !isOpen;
    });
  </script>
</body>
</html>
